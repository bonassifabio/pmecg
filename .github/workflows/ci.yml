name: Run tests and linting

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'pixi.lock'
      - '.github/workflows/ci.yml'
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'pixi.lock'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: default
          locked: true
          cache: true

      - name: Lint and format check
        run: pixi run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: '3.9'
            environment: py39
          - python-version: '3.10'
            environment: py310
          - python-version: '3.11'
            environment: py311
          - python-version: '3.12'
            environment: py312
          - python-version: '3.13'
            environment: py313
          - python-version: '3.14'
            environment: py314
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: ${{ matrix.environment }}
          locked: true
          cache: true

      - name: Cache PTB-XL data
        uses: actions/cache@v4
        with:
          path: tests/.ptbxl-cache
          key: ptbxl-${{ hashFiles('tests/ptbxl_helper.py') }}

      - name: Run tests on Python ${{ matrix.python-version }}
        run: pixi run -e ${{ matrix.environment }} test
