name: Release pmecg

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: default
          locked: false
          cache: true

      - name: Build wheel and source tarball
        run: pixi run build-dist

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  github-release:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/** \
            --repo "$GITHUB_REPOSITORY" \
            --title "pmecg $TAG" \
            --generate-notes

  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/pmecg

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  trigger-rtd:
    name: Trigger Read the Docs build
    needs: [github-release, publish-pypi]
    runs-on: ubuntu-latest

    steps:
      - name: Sync versions and trigger RTD build
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Tell RTD to sync versions (so it discovers the new tag)
          curl --fail-with-body -X POST \
            -H "Authorization: Token ${{ secrets.RTD_API_TOKEN }}" \
            https://readthedocs.org/api/v3/projects/pmecg/sync-versions/

          # Wait for sync to pick up the new tag
          sleep 15

          # Trigger a build for this specific version
          curl --fail-with-body -X POST \
            -H "Authorization: Token ${{ secrets.RTD_API_TOKEN }}" \
            https://readthedocs.org/api/v3/projects/pmecg/versions/${TAG}/builds/
